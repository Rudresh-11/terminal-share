<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>#terminal-container { width: 100%; height: 500px; background: #000; padding: 10px; }</style>
</head>
<body>
    <h3>Remote Terminal</h3>
    <div id="terminal-container"></div>

    <script>
        const socket = io();
        const sessionId = 'my-secret-session';
        const term = new Terminal({ cursorBlink: true, theme: { background: '#1e1e1e' } });
        
        term.open(document.getElementById('terminal-container'));
        socket.emit('join-session', sessionId);

        // Display data from the host
        socket.on('terminal-output', (data) => term.write(data));

        // Send keystrokes to the host
        term.onData((data) => socket.emit('terminal-input', { sessionId, data }));
    </script>
</body>
</html>
