<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Terminal Share</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #auth-container {
            background: #161b22;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #30363d;
            max-width: 400px;
            width: 90%;
            transition: opacity 0.3s ease;
        }
        h3 { margin-top: 0; font-weight: 400; color: #f0f6fc; }
        p { color: #8b949e; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #f0f6fc;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 6px;
            width: 200px;
            margin-bottom: 1rem;
            letter-spacing: 4px;
            outline: none;
        }
        input:focus { border-color: #58a6ff; }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #2ea043; }
        #terminal-wrapper {
            display: none;
            width: 95vw;
            height: 90vh;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #30363d;
        }
        #terminal-container { width: 100%; height: 100%; }
        .error-msg { color: #f85149; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div id="auth-container">
        <h3>Remote Terminal</h3>
        <p>Enter the 6-digit session code to start mirroring</p>
        <div id="error" class="error-msg">Invalid session code. Please try again.</div>
        <input type="text" id="session-code" maxlength="6" placeholder="000000" spellcheck="false">
        <br>
        <button id="connect-btn">Connect</button>
    </div>

    <div id="terminal-wrapper">
        <div id="terminal-container"></div>
    </div>

    <script>
        const socket = io();
        let term = null;
        let currentSessionId = null;

        const authContainer = document.getElementById('auth-container');
        const terminalWrapper = document.getElementById('terminal-wrapper');
        const codeInput = document.getElementById('session-code');
        const connectBtn = document.getElementById('connect-btn');
        const errorDiv = document.getElementById('error');

        connectBtn.onclick = () => {
            const code = codeInput.value;
            if (code.length !== 6) {
                showError('Code must be exactly 6 digits');
                return;
            }

            currentSessionId = code;
            socket.emit('join-session', code);
        };

        socket.on('session-joined', ({ status, message }) => {
            if (status === 'success') {
                startTerminal();
            } else {
                showError(message || 'Connection failed');
            }
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }

        function startTerminal() {
            authContainer.style.display = 'none';
            terminalWrapper.style.display = 'block';

            term = new Terminal({
                cursorBlink: true,
                theme: {
                    background: '#1e1e1e',
                    foreground: '#cccccc'
                },
                fontSize: 14,
                fontFamily: 'Menlo, Monaco, "Courier New", monospace'
            });

            term.open(document.getElementById('terminal-container'));

            socket.on('terminal-output', (data) => term.write(data));
            term.onData((data) => socket.emit('terminal-input', { sessionId: currentSessionId, data }));
        }
    </script>
</body>
</html>
